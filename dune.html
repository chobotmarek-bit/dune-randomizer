<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUNE: Imperium Randomizer</title>

<style>
body {
    background: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
}

input, button {
    padding: 10px;
    margin-top: 10px;
}

button {
    cursor: pointer;
}

.player {
    margin-top: 25px;
}

.char {
    display: inline-block;
    margin-right: 20px;
    text-align: center;
}

.char img {
    width: 160px;
    height: 160px;
    object-fit: contain;
    display: block;
}

.missing {
    color: red;
    font-size: 12px;
}
</style>
</head>

<body>

<h2>DUNE: Imperium Randomizer</h2>

<label>Počet hráčov (2–4):</label><br>
<input type="number" id="numPlayers" min="2" max="4" value="2">
<button onclick="assignCharacters()">Prideliť postavy</button>

<div id="results"></div>

<script>

const characters = [
    "Muad'Dib", "Liet Kynes", "Duncan Idaho",
    "Feyd-Rautha", "Gurney Halleck", "Lady Margot", "Lady Amber Metulli",
    "Staban Tuek", "Steersman Y’rkoon", "Piter De Vries", "Esmar Tuek",
    "Gaius Helen Mohiam", "Kota Odax", "Princess Irulan", "Emperor Shaddam Corrino IV"
];

// 👉 TU nastav cestu k obrázkom
// napr:
// "c:\Users\chobo\Projekt AI Duna\iphone\" (ak máš priečinok vedľa HTML)
// alebo URL: https://mojserver.com/img/
const IMAGE_PATH = "img/";

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function assignCharacters() {
    const num = parseInt(document.getElementById("numPlayers").value);

    if (isNaN(num) || num < 2 || num > 4) {
        alert("Zadaj počet hráčov 2–4");
        return;
    }

    const shuffled = shuffle([...characters]);
    const results = document.getElementById("results");
    results.innerHTML = "";

    for (let i = 0; i < num; i++) {
        const playerDiv = document.createElement("div");
        playerDiv.className = "player";

        const title = document.createElement("h3");
        title.textContent = "Player " + (i + 1);
        playerDiv.appendChild(title);

        for (let j = 0; j < 2; j++) {
            const index = i * 2 + j;
            const charName = shuffled[index];

            const charDiv = document.createElement("div");
            charDiv.className = "char";

            const img = document.createElement("img");
            img.src = IMAGE_PATH + charName + ".png";

            // fallback keď obrázok neexistuje
            img.onerror = function () {
                this.style.display = "none";
                const missing = document.createElement("div");
                missing.textContent = charName + " (chýba obrázok)";
                missing.className = "missing";
                charDiv.appendChild(missing);
            };

            const label = document.createElement("div");
            label.textContent = charName;

            charDiv.appendChild(img);
            charDiv.appendChild(label);
            playerDiv.appendChild(charDiv);
        }

        results.appendChild(playerDiv);
    }
}

</script>

</body>
</html>
